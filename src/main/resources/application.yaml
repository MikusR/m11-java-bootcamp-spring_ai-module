spring:
  application:
    name: springai-bootcamp-demo
  datasource:
    url: jdbc:sqlite:${SQLITE_DB_PATH:chatbot.db}
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
    open-in-view: false
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: gemma3:270m
    openrouter:
      base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
      api-key: ${OPENROUTER_API_KEY:}
      model: ${OPENROUTER_MODEL:tencent/hy3:free}
      temperature: ${OPENROUTER_TEMPERATURE:0.9}
      max-completion-tokens: ${OPENROUTER_MAX_COMPLETION_TOKENS:1024}
