spring:
  application:
    name: springai-bootcamp-demo
  datasource:
    url: jdbc:sqlite:${SQLITE_DB_PATH:chatbot.db}
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
    open-in-view: false
  ai:
    model:
      audio:
        speech: none
        transcription: none
      chat: ollama
      embedding: none
      image: none
      moderation: none
    ollama:
      base-url: http://localhost:11434
      chat:
        model: gemma3:270m
