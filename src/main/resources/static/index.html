<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SpringAI Bootcamp Chatbot</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --panel-2: #273449;
            --accent: #6366f1;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --user: #4f46e5;
            --assistant: #334155;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
        }
        aside {
            width: 280px;
            background: var(--panel);
            display: flex;
            flex-direction: column;
            border-right: 1px solid #0b1120;
        }
        aside header {
            padding: 16px;
            font-weight: 600;
            font-size: 18px;
            border-bottom: 1px solid #0b1120;
        }
        #new-chat-provider {
            margin: 12px 12px 0 12px;
            padding: 10px;
            border: 1px solid var(--panel-2);
            border-radius: 8px;
            background: var(--panel-2);
            color: var(--text);
            font-size: 14px;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }
        #new-chat-provider:focus {
            border-color: var(--accent);
        }
        #new-chat {
            margin: 8px 12px 12px 12px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        #new-chat:hover { opacity: 0.9; }
        #chat-list { flex: 1; overflow-y: auto; padding: 0 8px; }
        .chat-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .chat-item:hover { background: var(--panel-2); }
        .chat-item.active { background: var(--panel-2); }
        .chat-item .title {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }
        .chat-item .count { color: var(--muted); font-size: 12px; }
        .list-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            color: white;
            white-space: nowrap;
        }
        .list-badge.ollama {
            background: #4f46e5;
        }
        .list-badge.openrouter {
            background: #059669;
        }
        .chat-item .del {
            border: none;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: 14px;
        }
        .chat-item .del:hover { color: #f87171; }
        main { flex: 1; display: flex; flex-direction: column; }
        main header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--panel);
            font-weight: 600;
        }
        #chatMessages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .msg { max-width: 70%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; }
        .msg.user { align-self: flex-end; background: var(--user); }
        .msg.assistant { align-self: flex-start; background: var(--assistant); }
        .msg .role { font-size: 11px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
        .empty { color: var(--muted); margin: auto; text-align: center; }
        form {
            display: flex;
            gap: 10px;
            padding: 16px 20px;
            border-top: 1px solid var(--panel);
        }
        #input {
            flex: 1;
            resize: none;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--panel-2);
            background: var(--panel);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
        }
        #send {
            padding: 0 20px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            cursor: pointer;
        }
        #send:disabled { opacity: 0.5; cursor: default; }
        #provider-badge {
            display: none;
            align-items: center;
            padding: 0 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: white;
            white-space: nowrap;
        }
        #provider-badge.ollama {
            display: inline-flex;
            background: #4f46e5;
            box-shadow: 0 0 12px rgba(79, 70, 229, 0.3);
        }
        #provider-badge.openrouter {
            display: inline-flex;
            background: #059669;
            box-shadow: 0 0 12px rgba(5, 150, 105, 0.3);
        }
        #error { color: #f87171; padding: 0 20px 10px; min-height: 18px; font-size: 13px; }
    </style>
</head>
<body>
<aside>
    <header>💬 Chats</header>
    <select id="new-chat-provider">
        <option value="ollama">Ollama (Local)</option>
        <option value="openrouter">OpenRouter (Remote)</option>
    </select>
    <button id="new-chat">+ New chat</button>
    <div id="chat-list"></div>
</aside>
<main>
    <header id="chat-title">Select or start a chat</header>
    <div id="chatMessages"><div class="empty">No conversation selected.</div></div>
    <div id="error"></div>
    <form id="composer">
        <span id="provider-badge"></span>
        <textarea id="input" rows="2" placeholder="Type a chatMessage and press Enter..." disabled></textarea>
        <button id="send" type="submit" disabled>Send</button>
    </form>
</main>
<script src="/app.js?v=chatMessages"></script>
</body>
</html>
