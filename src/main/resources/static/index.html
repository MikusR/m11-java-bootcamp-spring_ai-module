<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SpringAI Bootcamp Chatbot</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --panel-2: #273449;
            --accent: #6366f1;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --user: #4f46e5;
            --assistant: #334155;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .app-shell {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        aside {
            background: var(--panel);
            display: flex;
            flex-direction: column;
            border-right: 1px solid #0b1120;
        }
        aside header {
            padding: 16px;
            font-weight: 600;
            font-size: 18px;
            border-bottom: 1px solid #0b1120;
        }
        .mode-nav {
            display: flex;
            gap: 8px;
            padding: 10px 16px;
            border-bottom: 1px solid #0b1120;
            background: #111827;
        }
        .mode-nav button {
            padding: 8px 12px;
            border: 0;
            border-radius: 8px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font: inherit;
            white-space: nowrap;
        }
        .mode-nav button:hover,
        .mode-nav button.active {
            background: var(--panel-2);
            color: var(--text);
        }
        #composer-provider {
            width: 150px;
            padding: 10px;
            border: 1px solid var(--panel-2);
            border-radius: 8px;
            background: var(--panel);
            color: var(--text);
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }
        #composer-provider:focus {
            border-color: var(--accent);
        }
        #new-chat {
            margin: 12px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        #new-chat:hover { opacity: 0.9; }
        #chat-list { flex: 1; overflow-y: auto; padding: 0 8px; }
        .chat-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .chat-item:hover { background: var(--panel-2); }
        .chat-item.active { background: var(--panel-2); }
        .chat-item .title {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }
        .chat-item .count { color: var(--muted); font-size: 12px; }
        .list-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            color: white;
            white-space: nowrap;
        }
        .list-badge.ollama {
            background: #4f46e5;
        }
        .list-badge.openrouter {
            background: #059669;
        }
        .chat-item .del {
            border: none;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: 14px;
        }
        .chat-item .del:hover { color: #f87171; }
        .workspace {
            min-width: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .view {
            flex: 1;
            min-height: 0;
            display: none;
            flex-direction: column;
        }
        .view.active {
            display: flex;
        }
        #chat-view.active {
            display: grid;
            grid-template-columns: 280px minmax(0, 1fr);
        }
        .chat-panel {
            min-width: 0;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }
        main header,
        .learning-panel header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--panel);
            font-weight: 600;
        }
        #chatMessages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .msg { max-width: 70%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; }
        .msg.user { align-self: flex-end; background: var(--user); }
        .msg.assistant { align-self: flex-start; background: var(--assistant); }
        .msg .role { font-size: 11px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
        .formatted {
            white-space: normal;
            overflow-wrap: anywhere;
        }
        .formatted p,
        .formatted ul,
        .formatted ol,
        .formatted pre {
            margin: 0 0 10px;
        }
        .formatted p:last-child,
        .formatted ul:last-child,
        .formatted ol:last-child,
        .formatted pre:last-child {
            margin-bottom: 0;
        }
        .formatted ul,
        .formatted ol {
            padding-left: 20px;
        }
        .formatted li {
            margin-bottom: 4px;
        }
        .formatted .formatted-heading {
            margin: 12px 0 6px;
            font-weight: 700;
        }
        .formatted .formatted-heading:first-child {
            margin-top: 0;
        }
        .formatted pre {
            padding: 10px;
            border-radius: 8px;
            background: #020617;
            overflow-x: auto;
            white-space: pre-wrap;
        }
        .formatted code {
            font-family: "Cascadia Code", "SFMono-Regular", Consolas, monospace;
            font-size: 13px;
        }
        .empty { color: var(--muted); margin: auto; text-align: center; }
        form {
            display: flex;
            gap: 10px;
            padding: 16px 20px;
            border-top: 1px solid var(--panel);
        }
        #input {
            flex: 1;
            resize: none;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--panel-2);
            background: var(--panel);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
        }
        #send {
            padding: 0 20px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            cursor: pointer;
        }
        #send:disabled { opacity: 0.5; cursor: default; }
        #provider-badge {
            display: none;
            align-items: center;
            padding: 0 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: white;
            white-space: nowrap;
        }
        #provider-badge.ollama {
            display: inline-flex;
            background: #4f46e5;
        }
        #provider-badge.openrouter {
            display: inline-flex;
            background: #059669;
        }
        #error { color: #f87171; padding: 0 20px 10px; min-height: 18px; font-size: 13px; }
        .learning-panel {
            background: #111827;
        }
        .debug-panel {
            background: #111827;
        }
        .learning-body {
            padding: 20px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: minmax(320px, 440px) minmax(0, 1fr);
            gap: 20px;
            align-items: start;
        }
        #learning-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 16px;
            border: 1px solid var(--panel-2);
            border-radius: 8px;
            background: var(--panel);
        }
        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .field label {
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0;
        }
        .field textarea,
        .field input,
        .field select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--panel-2);
            background: #111827;
            color: var(--text);
            font: inherit;
        }
        .topic-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }
        .topic-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .topic-toolbar label {
            margin: 0;
        }
        #auto-select-topics {
            padding: 6px 10px;
            border: 1px solid var(--panel-2);
            border-radius: 8px;
            background: #0f766e;
            color: white;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }
        #auto-select-topics:hover { background: #0d9488; }
        #auto-select-topics:disabled { opacity: 0.5; cursor: default; }
        .topic-option {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            padding: 8px;
            border-radius: 8px;
            background: #111827;
            color: var(--text);
            font-size: 13px;
            line-height: 1.35;
        }
        .topic-copy {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .topic-summary {
            color: var(--muted);
            font-size: 12px;
        }
        .topic-option input { margin-top: 2px; }
        #diagnose {
            padding: 10px 12px;
            border: none;
            border-radius: 8px;
            background: #14b8a6;
            color: #042f2e;
            cursor: pointer;
            font-weight: 700;
        }
        #diagnose:disabled { opacity: 0.5; cursor: default; }
        #learning-error { color: #f87171; min-height: 18px; font-size: 13px; }
        #learning-results {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .learning-output {
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-width: 0;
        }
        .article-library {
            padding: 16px;
            border: 1px solid var(--panel-2);
            border-radius: 8px;
            background: var(--panel);
        }
        .article-library h2 {
            margin: 0 0 12px;
            font-size: 16px;
        }
        .article-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }
        .article-card {
            padding: 12px;
            border-radius: 8px;
            background: #111827;
            border: 1px solid transparent;
        }
        .article-card.selected {
            border-color: #14b8a6;
        }
        .article-card h3 {
            margin: 0 0 6px;
            font-size: 14px;
        }
        .article-card p {
            margin: 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.4;
        }
        .article-card details {
            margin-top: 10px;
        }
        .article-card summary {
            color: #67e8f9;
            cursor: pointer;
            font-size: 13px;
        }
        .article-body {
            margin-top: 8px;
            white-space: pre-line;
            font-size: 13px;
            line-height: 1.45;
        }
        .result-block {
            padding: 14px;
            border: 1px solid var(--panel-2);
            border-radius: 8px;
            background: var(--panel);
        }
        .result-block h3 {
            margin: 0 0 8px;
            font-size: 13px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0;
        }
        .result-block p,
        .result-block li {
            font-size: 14px;
            line-height: 1.45;
        }
        .result-block ul,
        .result-block ol {
            margin: 0;
            padding-left: 20px;
        }
        .context-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .context-pill {
            padding: 4px 8px;
            border-radius: 999px;
            background: var(--panel-2);
            color: var(--text);
            font-size: 12px;
        }
        #learning-debug {
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .debug-json {
            padding: 14px;
            border: 1px solid var(--panel-2);
            border-radius: 8px;
            background: #020617;
            color: var(--text);
            overflow-x: auto;
            white-space: pre-wrap;
            font: 13px "Cascadia Code", "SFMono-Regular", Consolas, monospace;
        }
        .prompt-debug-section {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 10px;
        }
        .prompt-debug-title {
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }
        @media (max-width: 1100px) {
            #chat-view.active {
                grid-template-columns: 240px minmax(0, 1fr);
            }
            .learning-body {
                grid-template-columns: 1fr;
            }
            .article-grid {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 720px) {
            .mode-nav {
                overflow-x: auto;
            }
            #chat-view.active {
                display: flex;
                flex-direction: column;
            }
            aside {
                min-height: 220px;
            }
            main {
                min-height: 520px;
            }
            .msg {
                max-width: 92%;
            }
            .topic-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="app-shell">
    <div class="workspace">
        <nav class="mode-nav" aria-label="Workspace">
            <button class="active" type="button" data-view="chat-view">Chat</button>
            <button type="button" data-view="learning-view">Learning Path</button>
            <button type="button" data-view="learning-debug-view">Learning Debug</button>
        </nav>
        <main id="chat-view" class="view active">
            <aside>
                <header>Chats</header>
                <button id="new-chat">+ New chat</button>
                <div id="chat-list"></div>
            </aside>
            <div class="chat-panel">
                <header id="chat-title">Select or start a chat</header>
                <div id="chatMessages"><div class="empty">No conversation selected.</div></div>
                <div id="error"></div>
                <form id="composer">
                    <span id="provider-badge"></span>
                    <select id="composer-provider" aria-label="Chat provider">
                        <option value="ollama">Ollama</option>
                        <option value="openrouter">OpenRouter</option>
                    </select>
                    <textarea id="input" rows="2" placeholder="Type a chatMessage and press Enter..." disabled></textarea>
                    <button id="send" type="submit" disabled>Send</button>
                </form>
            </div>
        </main>
        <section id="learning-view" class="learning-panel view" aria-labelledby="learning-title">
            <header id="learning-title">Learning Path Doctor</header>
            <div class="learning-body">
                <form id="learning-form">
                    <div class="field">
                        <label for="learner-goal">Learner goal</label>
                        <textarea id="learner-goal" rows="3" maxlength="1000" required>I want to build a Spring AI chatbot confidently.</textarea>
                    </div>
                    <div class="field">
                        <label for="learner-struggles">Current struggles</label>
                        <textarea id="learner-struggles" rows="4" maxlength="3000" required>I understand controllers but get confused about services, DTOs, and AI prompts.</textarea>
                    </div>
                    <div class="field">
                        <div class="topic-toolbar">
                            <label>Topics</label>
                            <button id="auto-select-topics" type="button">Auto-select from prompt</button>
                        </div>
                        <div id="learning-topics" class="topic-grid"></div>
                    </div>
                    <div class="field">
                        <label for="time-available">Time available</label>
                        <input id="time-available" type="number" min="15" max="240" value="45" required>
                    </div>
                    <div class="field">
                        <label for="learning-provider">Provider</label>
                        <select id="learning-provider">
                            <option value="ollama">Ollama (Local)</option>
                            <option value="openrouter">OpenRouter (Remote)</option>
                        </select>
                    </div>
                    <button id="diagnose" type="submit">Diagnose</button>
                    <div id="learning-error"></div>
                </form>
                <div class="learning-output">
                    <div id="learning-results"></div>
                    <section class="article-library" aria-labelledby="articles-title">
                        <h2 id="articles-title">Knowledge Articles</h2>
                        <div id="knowledge-articles" class="article-grid"></div>
                    </section>
                </div>
            </div>
        </section>
        <section id="learning-debug-view" class="debug-panel view" aria-labelledby="learning-debug-title">
            <header id="learning-debug-title">Learning Path Debug</header>
            <div id="learning-debug"><div class="empty">Run a Learning Path diagnosis to inspect debug data.</div></div>
        </section>
    </div>
</div>
<script src="/app.js?v=chatMessages"></script>
</body>
</html>
